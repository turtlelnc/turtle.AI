name: Build Multi-Platform EXE

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # 定义操作系统矩阵
        include:
          - os: windows-latest
            artifact_name: train-windows-exe
            executable: train.exe
          - os: macos-latest
            artifact_name: train-macos-binary
            executable: train

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # --- Windows 专用设置 ---
    - name: Setup MinGW (Windows only)
      if: matrix.os == 'windows-latest'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-openblas
          mingw-w64-x86_64-cmake
          make
          git

    # --- macOS 专用设置 (安装 OpenMP) ---
    - name: Install dependencies (macOS only)
      if: matrix.os == 'macos-latest'
      run: |
        brew install libomp openblas

    # --- 编译步骤 (根据系统切换 Shell 和指令) ---
    - name: Compile (Windows)
      if: matrix.os == 'windows-latest'
      shell: msys2 {0}
      run: |
        g++ -O3 -std=c++17 \
          train.cpp BPE.cpp \
          -o ${{ matrix.executable }} \
          -I. \
          -fopenmp \
          -static-libgcc \
          -static-libstdc++ \
          -Wl,-Bstatic -lgomp -lwinpthread -Wl,-Bdynamic
          
    - name: Compile (macOS)
      if: matrix.os == 'macos-latest'
      run: |
            # 1. 动态获取 libomp 和 openblas 的安装路径
            LIBOMP_PATH=$(brew --prefix libomp)
            OPENBLAS_PATH=$(brew --prefix openblas)
            
            # 2. 执行编译
            # -DACCELERATE_NEW_LAPACK 解决 cblas_sgemm 弃用警告
            # 使用动态路径包含头文件和库文件
            clang++ -O3 -std=c++17 \
              train.cpp BPE.cpp \
              -o ${{ matrix.executable }} \
              -I. \
              -I${LIBOMP_PATH}/include \
              -I${OPENBLAS_PATH}/include \
              -L${LIBOMP_PATH}/lib \
              -L${OPENBLAS_PATH}/lib \
              -Xpreprocessor -fopenmp \
              -lomp -lopenblas \
              -DACCELERATE_NEW_LAPACK \          
              -static-libgcc \
              -static-libstdc++ \
              -framework Accelerate

    # --- 验证与上传 ---
    - name: Verify Output
      shell: bash
      run: |
        ls -lh ${{ matrix.executable }}
        file ${{ matrix.executable }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.executable }}
        retention-days: 5
