name: Build Windows EXE

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MinGW (GCC for Windows)
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-openblas
          mingw-w64-x86_64-cmake
          make
          git

    - name: Compile train.cpp and BPE sources
      shell: msys2 {0}
      run: |
        g++ -O3 -std=c++17 \
            train.cpp BPE.cpp \
            -o train.exe \
            -I. \
            -fopenmp -lstdc++ -static-libgcc -static-libstdc++

    - name: Verify Output
      shell: msys2 {0}
      run: |
        ls -lh train.exe
        file train.exe

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: train-windows-exe
        path: train.exe
        retention-days: 5
